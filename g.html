<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Goal ⚽ - 2 Player Football</title>
    <style>
        /* CSS: गेम की एकदम झक्कास स्टाइलिंग */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #2E8B57; /* मैदान का हरा रंग */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            touch-action: none; /* मोबाइल पर फालतू स्वाइप रोकना */
        }

        #gameCanvas {
            display: block; width: 100%; height: 100%;
        }

        /* UI कंटेनर जो कैनवास के ऊपर दिखेगा */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* टॉप स्कोर और टाइमर बार (Glassmorphism) */
        .top-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 50px; align-items: center;
            background: rgba(0, 0, 0, 0.6); padding: 10px 40px;
            border-radius: 40px; border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .score-box { text-align: center; }
        .score-box span { display: block; font-size: 14px; font-weight: bold; color: #ccc; }
        .score-box .points { font-size: 45px; font-weight: 900; }
        
        /* P1 (Blue) aur P2 (Red) ke colors */
        #p1ScoreText { color: #3399ff; text-shadow: 0 0 15px rgba(51,153,255,0.6); }
        #p2ScoreText { color: #ff4d4d; text-shadow: 0 0 15px rgba(255,77,77,0.6); }
        
        #timerText { font-size: 35px; font-weight: 900; color: #ffeb3b; text-shadow: 0 0 15px rgba(255,235,59,0.5); }

        /* मेनू और गेम ओवर स्क्रीन */
        .panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 30, 20, 0.85); backdrop-filter: blur(15px);
            padding: 40px 50px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center; pointer-events: auto; width: 90%; max-width: 550px;
        }

        .panel h1 { font-size: 45px; color: #fff; margin-bottom: 5px; }
        .panel p { font-size: 16px; color: #bbb; margin-bottom: 25px; line-height: 1.6; }
        .panel h3 { color: #ffeb3b; margin-bottom: 10px;}

        .play-btn {
            background: linear-gradient(135deg, #00C9FF 0%, #92FE9D 100%);
            border: none; padding: 15px 50px; font-size: 24px; font-weight: 900;
            border-radius: 50px; color: #000; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,201,255,0.4); transition: transform 0.2s; text-transform: uppercase;
        }
        .play-btn:hover { transform: scale(1.05); }
        .play-btn:active { transform: scale(0.95); }

        .hidden { display: none !important; }

        /* GOAL Animation Text */
        #goalAlert {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: 900; color: #fff;
            text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ff9900;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .show-goal { animation: goalPop 1.5s ease-out; }
        @keyframes goalPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- गेम कैनवास -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI लेयर -->
    <div class="ui-layer">
        
        <!-- टॉप बार -->
        <div class="top-bar hidden" id="topBar">
            <div class="score-box">
                <span style="color:#3399ff;">P1 (Keyboard)</span>
                <div class="points" id="p1ScoreText">0</div>
            </div>
            <div id="timerText">60</div>
            <div class="score-box">
                <span style="color:#ff4d4d;">P2 (Mouse)</span>
                <div class="points" id="p2ScoreText">0</div>
            </div>
        </div>

        <!-- GOAL अलर्ट -->
        <div id="goalAlert">GOAL! ⚽</div>

        <!-- स्टार्ट स्क्रीन -->
        <div class="panel" id="startScreen">
            <h1>सुपर Goal ⚽</h1>
            <h3>1v1 Arena Football</h3>
            <p>
                🟦 <b>Player 1 (Left):</b> W, A, S, D बटन से खेलें।<br>
                🟥 <b>Player 2 (Right):</b> माउस (Mouse) घुमाकर खेलें।<br>
                📱 <b>Mobile:</b> स्क्रीन के बाएँ/दाएँ हिस्से पर टच करके खेलें।
            </p>
            <button class="play-btn" id="startBtn">KICK OFF 🏁</button>
        </div>

        <!-- गेम ओवर स्क्रीन -->
        <div class="panel hidden" id="gameOverScreen">
            <h1 id="winnerText" style="color: #ffeb3b;">Match Drawn!</h1>
            <p id="finalScoreDesc" style="font-size: 24px; font-weight: bold; color: #fff;">P1: 0 - P2: 0</p>
            <button class="play-btn" id="restartBtn">PLAY AGAIN 🔄</button>
        </div>

    </div>

    <script>
        /* =========================================
           साउंड इंजन (Web Audio API - Fast & Crisp) 🎵
           ========================================= */
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'kick') {
                // बॉल को किक मारने की आवाज़ (Thump)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
                gainNode.gain.setValueAtTime(0.8, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } 
            else if (type === 'bounce') {
                // दीवार से टकराने की आवाज़ (Tap)
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            }
            else if (type === 'whistle') {
                // रेफरी की सीटी
                osc.type = 'square';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.setValueAtTime(1400, now + 0.1); // Pitch bend
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        /* =========================================
           गेम सेटअप और कैनवास 🎮
           ========================================= */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const ui = {
            start: document.getElementById('startScreen'),
            gameOver: document.getElementById('gameOverScreen'),
            topBar: document.getElementById('topBar'),
            p1Score: document.getElementById('p1ScoreText'),
            p2Score: document.getElementById('p2ScoreText'),
            timer: document.getElementById('timerText'),
            winner: document.getElementById('winnerText'),
            finalDesc: document.getElementById('finalScoreDesc'),
            goalAlert: document.getElementById('goalAlert')
        };

        let currentState = 'START';
        let animationId;
        let p1Score = 0; let p2Score = 0;
        let timeLeft = 60; let lastTime = 0;
        let screenShake = 0;
        let scale = 1;

        // गोल पोस्ट की सेटिंग (Y एक्सिस पर)
        let goalTop, goalBottom, goalWidth;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            scale = canvas.height / 800; // बेस साइज़
            
            // गोल का साइज़ (स्क्रीन के बीच का 35% हिस्सा)
            goalWidth = canvas.height * 0.35;
            goalTop = (canvas.height / 2) - (goalWidth / 2);
            goalBottom = (canvas.height / 2) + (goalWidth / 2);

            if(currentState === 'START') resetPositions();
        }
        window.addEventListener('resize', resizeCanvas);

        /* =========================================
           गेम ऑब्जेक्ट्स (Players & Ball)
           ========================================= */
        
        // 🟦 Player 1 (Keyboard - Left Side)
        const p1 = {
            x: 0, y: 0, vx: 0, vy: 0,
            radius: 40, mass: 5,
            color: '#3399ff',
            keys: { w: false, a: false, s: false, d: false },
            speed: 1.2, friction: 0.85
        };

        // 🟥 Player 2 (Mouse/Touch - Right Side)
        const p2 = {
            x: 0, y: 0, vx: 0, vy: 0,
            radius: 40, mass: 5,
            color: '#ff4d4d',
            targetX: 0, targetY: 0 // माउस कहाँ है
        };

        // ⚽ फुटबॉल (The Ball)
        const ball = {
            x: 0, y: 0, vx: 0, vy: 0,
            radius: 20, mass: 1, // बॉल हल्की है (Physics!)
            friction: 0.985 // घास पर रगड़ (Friction)
        };

        function resetPositions() {
            p1.x = canvas.width * 0.25; p1.y = canvas.height / 2;
            p1.vx = 0; p1.vy = 0;

            p2.x = canvas.width * 0.75; p2.y = canvas.height / 2;
            p2.targetX = p2.x; p2.targetY = p2.y;
            p2.vx = 0; p2.vy = 0;

            ball.x = canvas.width / 2; ball.y = canvas.height / 2;
            ball.vx = 0; ball.vy = 0;
        }

        /* =========================================
           11th Class Physics Engine ⚛️
           ========================================= */
        
        function updatePhysics() {
            // --- Player 1 Movement (Keyboard) ---
            if (p1.keys.w) p1.vy -= p1.speed * scale;
            if (p1.keys.s) p1.vy += p1.speed * scale;
            if (p1.keys.a) p1.vx -= p1.speed * scale;
            if (p1.keys.d) p1.vx += p1.speed * scale;

            p1.x += p1.vx; p1.y += p1.vy;
            p1.vx *= p1.friction; p1.vy *= p1.friction; // फिसलना रुक जाए

            // P1 को अपनी (Left) साइड तक सीमित रखें
            p1.x = Math.max(p1.radius, Math.min(canvas.width/2 - p1.radius, p1.x));
            p1.y = Math.max(p1.radius, Math.min(canvas.height - p1.radius, p1.y));

            // --- Player 2 Movement (Mouse/Touch Follow) ---
            // P2 माउस की तरफ भागेगा (ताकि वेलोसिटी/vx-vy कैलकुलेट हो सके)
            let dx2 = p2.targetX - p2.x;
            let dy2 = p2.targetY - p2.y;
            p2.vx = dx2 * 0.2; // स्मूथ फॉलो
            p2.vy = dy2 * 0.2;
            
            p2.x += p2.vx; p2.y += p2.vy;

            // P2 को अपनी (Right) साइड तक सीमित रखें
            p2.x = Math.max(canvas.width/2 + p2.radius, Math.min(canvas.width - p2.radius, p2.x));
            p2.y = Math.max(p2.radius, Math.min(canvas.height - p2.radius, p2.y));

            // --- Ball Physics & Friction ---
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.vx *= ball.friction; // घास का घर्षण (Ball slows down)
            ball.vy *= ball.friction;

            // --- Collisions (संघट्ट) ---
            checkCollision(p1, ball);
            checkCollision(p2, ball);

            // --- Wall Bounces & Goals ---
            // ऊपर और नीचे की दीवारें
            if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy *= -0.8; playSound('bounce'); }
            if (ball.y + ball.radius > canvas.height) { ball.y = canvas.height - ball.radius; ball.vy *= -0.8; playSound('bounce'); }

            // बाएँ और दाएँ की दीवारें (Goals Check)
            if (ball.x - ball.radius < 0) {
                if (ball.y > goalTop && ball.y < goalBottom) {
                    scoreGoal(2); // P2 (Right) ने गोल किया!
                } else {
                    ball.x = ball.radius; ball.vx *= -0.8; playSound('bounce');
                }
            }
            if (ball.x + ball.radius > canvas.width) {
                if (ball.y > goalTop && ball.y < goalBottom) {
                    scoreGoal(1); // P1 (Left) ने गोल किया!
                } else {
                    ball.x = canvas.width - ball.radius; ball.vx *= -0.8; playSound('bounce');
                }
            }
        }

        // दो गोल चीज़ों का टकराना (Elastic Collision Physics ⚛️)
        function checkCollision(player, b) {
            let dx = b.x - player.x;
            let dy = b.y - player.y;
            let distance = Math.hypot(dx, dy);
            let minDist = player.radius + b.radius;

            if (distance < minDist) {
                // ओवरलैप ठीक करें (ताकि अंदर न घुसें)
                let angle = Math.atan2(dy, dx);
                let overlap = minDist - distance;
                b.x += Math.cos(angle) * overlap;
                b.y += Math.sin(angle) * overlap;

                // प्लेयर की स्पीड से बॉल में धक्का लगाना (Transfer of Momentum)
                let hitForce = Math.hypot(player.vx, player.vy) * 0.8 + (3 * scale);
                b.vx += Math.cos(angle) * hitForce;
                b.vy += Math.sin(angle) * hitForce;

                // स्पीड की लिमिट ताकि बॉल गायब न हो जाए
                let maxSpeed = 25 * scale;
                let currentSpeed = Math.hypot(b.vx, b.vy);
                if(currentSpeed > maxSpeed) {
                    b.vx = (b.vx / currentSpeed) * maxSpeed;
                    b.vy = (b.vy / currentSpeed) * maxSpeed;
                }

                playSound('kick');
            }
        }

        /* =========================================
           ड्राइंग (Drawing the Field) 🎨
           ========================================= */
        function drawField() {
            // घास की पट्टियां (Grass stripes)
            let stripeWidth = canvas.width / 10;
            for (let i = 0; i < 10; i++) {
                ctx.fillStyle = i % 2 === 0 ? '#2E8B57' : '#277A4D';
                ctx.fillRect(i * stripeWidth, 0, stripeWidth, canvas.height);
            }

            ctx.lineWidth = 4 * scale;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';

            // मैदान की बाउंड्री
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

            // बीच की लाइन और सर्कल
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 10);
            ctx.lineTo(canvas.width / 2, canvas.height - 10);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 80 * scale, 0, Math.PI * 2);
            ctx.stroke();

            // गोल एरिया (Penalty Box)
            // Left
            ctx.strokeRect(10, goalTop - 50, 120 * scale, goalWidth + 100);
            // Right
            ctx.strokeRect(canvas.width - 10 - 120 * scale, goalTop - 50, 120 * scale, goalWidth + 100);

            // गोल नेट (Goals)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(0, goalTop, 20, goalWidth); // Left Net
            ctx.fillRect(canvas.width - 20, goalTop, 20, goalWidth); // Right Net
            
            // गोल के खंभे (Posts)
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(15, goalTop, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(15, goalBottom, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(canvas.width-15, goalTop, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(canvas.width-15, goalBottom, 8, 0, Math.PI*2); ctx.fill();
        }

        function drawPlayer(p, isP1) {
            ctx.save();
            ctx.translate(p.x, p.y);
            
            // परछाई (Shadow)
            ctx.beginPath();
            ctx.arc(5, 5, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fill();

            // प्लेयर का शरीर
            ctx.beginPath();
            ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#fff';
            ctx.stroke();
            
            // हल्का सा 3D इफ़ेक्ट
            ctx.beginPath();
            ctx.arc(-8, -8, p.radius/2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fill();

            // प्लेयर के ऊपर नाम
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${16*scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText(isP1 ? "P1" : "P2", 0, 6*scale);

            ctx.restore();
        }

        function drawBall() {
            ctx.save();
            ctx.translate(ball.x, ball.y);
            
            // परछाई
            ctx.beginPath();
            ctx.arc(4, 4, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fill();

            // बॉल
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#000';
            ctx.stroke();

            // बॉल के अंदर का डिज़ाइन (घुमने का इफ़ेक्ट)
            let rotation = (ball.x + ball.y) * 0.05; // स्पीड के हिसाब से घूमेगी
            ctx.rotate(rotation);
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(0, 0, ball.radius/2, 0, Math.PI*2); ctx.fill();
            for(let i=0; i<3; i++){
                ctx.beginPath();
                ctx.moveTo(0,0);
                ctx.lineTo(Math.cos(i*2.1)*ball.radius, Math.sin(i*2.1)*ball.radius);
                ctx.lineWidth = 4; ctx.stroke();
            }

            ctx.restore();
        }

        /* =========================================
           गेम लूप और लॉजिक 🔄
           ========================================= */
        function scoreGoal(playerNum) {
            playSound('whistle');
            screenShake = 20; // धमाका इफ़ेक्ट

            if (playerNum === 1) p1Score++;
            else p2Score++;

            ui.p1Score.innerText = p1Score;
            ui.p2Score.innerText = p2Score;

            // GOAL टेक्स्ट एनीमेशन
            ui.goalAlert.classList.remove('hidden', 'show-goal');
            void ui.goalAlert.offsetWidth; // रिसेट एनीमेशन
            ui.goalAlert.classList.add('show-goal');

            // गोल होने के बाद गेम 1 सेकंड रुकेगा फिर रीसेट
            currentState = 'GOAL_PAUSE';
            setTimeout(() => {
                resetPositions();
                if(timeLeft > 0) currentState = 'PLAYING';
            }, 1500);
        }

        function loop(timestamp) {
            // टाइमर
            if (currentState === 'PLAYING') {
                if (!lastTime) lastTime = timestamp;
                let dt = timestamp - lastTime;
                if (dt >= 1000) {
                    timeLeft--;
                    ui.timer.innerText = timeLeft;
                    lastTime = timestamp;
                    if (timeLeft <= 0) endGame();
                }
            }

            // स्क्रीन शेक
            ctx.save();
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                screenShake--;
            }

            drawField();

            if (currentState === 'PLAYING' || currentState === 'GOAL_PAUSE') {
                if(currentState === 'PLAYING') updatePhysics();
                drawPlayer(p1, true);
                drawPlayer(p2, false);
                drawBall();
            }

            ctx.restore();

            if(currentState !== 'STOPPED') animationId = requestAnimationFrame(loop);
        }

        function startGame() {
            initAudio();
            playSound('whistle');
            currentState = 'PLAYING';
            p1Score = 0; p2Score = 0;
            timeLeft = 60; lastTime = 0;
            ui.p1Score.innerText = '0'; ui.p2Score.innerText = '0';
            ui.timer.innerText = '60';

            resetPositions();
            resizeCanvas();

            ui.start.classList.add('hidden');
            ui.gameOver.classList.add('hidden');
            ui.topBar.classList.remove('hidden');
        }

        function endGame() {
            currentState = 'GAMEOVER';
            playSound('whistle');
            ui.topBar.classList.add('hidden');
            ui.gameOver.classList.remove('hidden');

            if (p1Score > p2Score) {
                ui.winner.innerText = "🟦 P1 (Left) WINS!";
                ui.winner.style.color = "#3399ff";
            } else if (p2Score > p1Score) {
                ui.winner.innerText = "🟥 P2 (Right) WINS!";
                ui.winner.style.color = "#ff4d4d";
            } else {
                ui.winner.innerText = "🤝 MATCH DRAW!";
                ui.winner.style.color = "#ffeb3b";
            }
            ui.finalDesc.innerText = `Final Score -> P1: ${p1Score} | P2: ${p2Score}`;
        }

        /* =========================================
           इनपुट्स (Keyboard, Mouse, Touch) ⌨️🖱️📱
           ========================================= */

        // --- Player 1: Keyboard ---
        window.addEventListener('keydown', (e) => {
            if(currentState !== 'PLAYING') return;
            const key = e.key.toLowerCase();
            if (key === 'w' || e.code === 'ArrowUp') p1.keys.w = true;
            if (key === 'a' || e.code === 'ArrowLeft') p1.keys.a = true;
            if (key === 's' || e.code === 'ArrowDown') p1.keys.s = true;
            if (key === 'd' || e.code === 'ArrowRight') p1.keys.d = true;
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || e.code === 'ArrowUp') p1.keys.w = false;
            if (key === 'a' || e.code === 'ArrowLeft') p1.keys.a = false;
            if (key === 's' || e.code === 'ArrowDown') p1.keys.s = false;
            if (key === 'd' || e.code === 'ArrowRight') p1.keys.d = false;
        });

        // --- Player 2: Mouse ---
        canvas.addEventListener('mousemove', (e) => {
            if(currentState !== 'PLAYING') return;
            // माउस अगर दाईं (Right) तरफ है, तभी P2 वहां जाएगा
            if (e.clientX > canvas.width / 2) {
                p2.targetX = e.clientX;
                p2.targetY = e.clientY;
            }
        });

        // --- Mobile: Multi-Touch ---
        canvas.addEventListener('touchmove', (e) => {
            if(currentState !== 'PLAYING') return;
            e.preventDefault(); // पेज को ऊपर-नीचे खिसकने से रोके
            
            for (let i = 0; i < e.touches.length; i++) {
                let t = e.touches[i];
                if (t.clientX < canvas.width / 2) {
                    // Left Side Touch -> P1 Move
                    // P1 कीबोर्ड की तरह नहीं, बल्कि उंगली के पीछे-पीछे भागेगा (टच के लिए इजी)
                    p1.x += (t.clientX - p1.x) * 0.15;
                    p1.y += (t.clientY - p1.y) * 0.15;
                    p1.vx = (t.clientX - p1.x) * 0.1; // कोलिजन के लिए स्पीड कैलकुलेट
                    p1.vy = (t.clientY - p1.y) * 0.1;
                } else {
                    // Right Side Touch -> P2 Move
                    p2.targetX = t.clientX;
                    p2.targetY = t.clientY;
                }
            }
        }, {passive: false});

        // UI Buttons
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // शुरुआत
        resizeCanvas();
        loop(); 

    </script>
</body>
</html>
