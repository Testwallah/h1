<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Royale 100% Working 💥</title>
    <style>
        /* CSS: एकदम बेसिक और मजबूत */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden; /* नो स्क्रॉलिंग */
            background-color: #1a2618; /* आर्मी ग्रीन */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block; width: 100%; height: 100%;
        }

        /* 🎛️ UI लेयर */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* हेल्थ बार्स */
        .health-container {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-around; padding: 0 10px;
        }
        .player-info {
            background: rgba(0, 0, 0, 0.7); padding: 5px 10px;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.3);
            width: 30%; max-width: 250px; text-align: center;
        }
        .name-tag { font-weight: bold; color: white; font-size: 14px; margin-bottom: 5px;}
        .health-bar-bg { width: 100%; height: 15px; background: #333; border-radius: 5px; overflow: hidden; }
        .health-fill { height: 100%; transition: width 0.2s; }
        #p1Health { background: red; width: 100%; }
        #p2Health { background: blue; width: 100%; }
        #p3Health { background: lime; width: 100%; }

        /* मेनू (इसे मैंने बहुत सिंपल कर दिया है ताकि कोई ग्लिच ना हो) */
        #startScreen, #gameOverScreen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 30, 20, 0.95); padding: 30px; border-radius: 15px;
            border: 2px solid #aaa; text-align: center; pointer-events: auto;
            width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 { color: #fff; font-size: 35px; margin-bottom: 20px; }
        p { color: #ccc; font-size: 16px; margin-bottom: 10px; }

        .play-btn {
            background: #ff5500; border: 2px solid #fff; padding: 15px 40px; 
            font-size: 24px; font-weight: bold; border-radius: 30px; color: #fff; 
            cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .play-btn:active { transform: scale(0.95); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        
        <div class="health-container hidden" id="healthBars">
            <div class="player-info" style="border-color: red;">
                <div class="name-tag" style="color: red;">P1 (Mouse)</div>
                <div class="health-bar-bg"><div class="health-fill" id="p1Health"></div></div>
            </div>
            <div class="player-info" style="border-color: #3388ff;">
                <div class="name-tag" style="color: #3388ff;">P2 (Arrows)</div>
                <div class="health-bar-bg"><div class="health-fill" id="p2Health"></div></div>
            </div>
            <div class="player-info" style="border-color: lime;">
                <div class="name-tag" style="color: lime;">P3 (WASD)</div>
                <div class="health-bar-bg"><div class="health-fill" id="p3Health"></div></div>
            </div>
        </div>

        <!-- एकदम सिंपल स्टार्ट स्क्रीन -->
        <div id="startScreen">
            <h1>Tank Battle 3P 💥</h1>
            <p>🔴 <b>P1:</b> Mouse & Click</p>
            <p>🔵 <b>P2:</b> Arrows ⬆️⬇️ & ENTER</p>
            <p>🟢 <b>P3:</b> W,A,S,D & SPACE</p>
            <button class="play-btn" id="startBtn">START GAME 🚀</button>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h1 id="winnerText">BOOYAH!</h1>
            <button class="play-btn" id="restartBtn">REMATCH 🔄</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🎮 GAME VARIABLES & SETUP
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentState = 'START';
        let scale = 1;
        let tanks = [], bullets = [], walls = [];

        // Inputs
        const keys = {};
        let mouseX = 0, mouseY = 0, mouseClicked = false;

        // की-बोर्ड स्क्रॉलिंग रोको (Fix)
        window.addEventListener('keydown', e => { 
            keys[e.code] = true; 
            if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.code)) {
                e.preventDefault(); 
            }
        });
        window.addEventListener('keyup', e => { keys[e.code] = false; });
        
        // माउस
        canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mousedown', e => { mouseClicked = true; });
        canvas.addEventListener('mouseup', e => { mouseClicked = false; });

        function resizeCanvas() {
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            scale = Math.min(canvas.width, canvas.height) / 800;
        }
        window.addEventListener('resize', resizeCanvas);

        // ==========================================
        // 🌍 MAP GENERATION
        // ==========================================
        function initMap() {
            let cw = canvas.width; let ch = canvas.height;
            walls = []; bullets = [];
            
            // सिंपल दीवारें
            for(let i=0; i<8; i++) {
                walls.push({ 
                    x: Math.random()*(cw-200)+100, 
                    y: Math.random()*(ch-200)+100, 
                    w: 80*scale, h: 40*scale 
                });
            }

            // 3 टैंक्स 
            tanks = [
                { id: 1, name: 'P1', x: 100, y: 100, vx: 0, vy: 0, angle: 0, color: 'red', hp: 100, speed: 4*scale, cooldown: 0, alive: true },
                { id: 2, name: 'P2', x: cw-100, y: 100, vx: 0, vy: 0, angle: Math.PI, color: '#3388ff', hp: 100, speed: 4.5*scale, cooldown: 0, alive: true },
                { id: 3, name: 'P3', x: cw/2, y: ch-100, vx: 0, vy: 0, angle: -Math.PI/2, color: 'lime', hp: 100, speed: 4.5*scale, cooldown: 0, alive: true }
            ];
            updateHealthUI();
        }

        // ==========================================
        // ⚛️ PHYSICS ENGINE (SIMPLE & SOLID)
        // ==========================================
        function updatePhysics() {
            const friction = 0.85; 
            const accel = 1 * scale;

            tanks.forEach(t => {
                if(!t.alive) return;
                
                let targetVx = 0, targetVy = 0;
                let isMoving = false;

                // कंट्रोल्स (Controls)
                if (t.id === 1) { // P1 Mouse
                    let dx = mouseX - t.x; let dy = mouseY - t.y;
                    let dist = Math.hypot(dx, dy);
                    t.angle = Math.atan2(dy, dx);
                    if (dist > 30) { targetVx = Math.cos(t.angle)*accel; targetVy = Math.sin(t.angle)*accel; isMoving=true; }
                    if (mouseClicked && t.cooldown <= 0) fireBullet(t);
                } 
                else if (t.id === 2) { // P2 Arrows
                    if (keys['ArrowUp']) { targetVy -= accel; isMoving=true; }
                    if (keys['ArrowDown']) { targetVy += accel; isMoving=true; }
                    if (keys['ArrowLeft']) { targetVx -= accel; isMoving=true; }
                    if (keys['ArrowRight']) { targetVx += accel; isMoving=true; }
                    if(isMoving) t.angle = Math.atan2(targetVy, targetVx);
                    if (keys['Enter'] && t.cooldown <= 0) fireBullet(t);
                } 
                else if (t.id === 3) { // P3 WASD
                    if (keys['KeyW']) { targetVy -= accel; isMoving=true; }
                    if (keys['KeyS']) { targetVy += accel; isMoving=true; }
                    if (keys['KeyA']) { targetVx -= accel; isMoving=true; }
                    if (keys['KeyD']) { targetVx += accel; isMoving=true; }
                    if(isMoving) t.angle = Math.atan2(targetVy, targetVx);
                    if (keys['Space'] && t.cooldown <= 0) fireBullet(t);
                }

                // स्पीड और घर्षण
                t.vx += targetVx; t.vy += targetVy;
                t.vx *= friction; t.vy *= friction;

                // स्पीड लिमिट
                let currentSpeed = Math.hypot(t.vx, t.vy);
                if (currentSpeed > t.speed) { 
                    t.vx = (t.vx/currentSpeed)*t.speed; 
                    t.vy = (t.vy/currentSpeed)*t.speed; 
                }

                t.x += t.vx; t.y += t.vy;

                // बाउंड्री रोकना
                let r = 20 * scale;
                t.x = Math.max(r, Math.min(canvas.width - r, t.x));
                t.y = Math.max(r, Math.min(canvas.height - r, t.y));

                // दीवार से टकराव 
                walls.forEach(w => resolveAABB(t, w));

                if(t.cooldown > 0) t.cooldown--;
            });

            // गोलियां (Bullets)
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i]; 
                b.x += b.vx; b.y += b.vy;
                let destroyed = false;

                // स्क्रीन के बाहर
                if (b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height) destroyed = true;

                // दीवार से टकराना (Bounce)
                walls.forEach(w => {
                    if(b.x > w.x && b.x < w.x+w.w && b.y > w.y && b.y < w.y+w.h) {
                        let fL = Math.abs(b.x-w.x), fR = Math.abs(b.x-(w.x+w.w));
                        let fT = Math.abs(b.y-w.y), fB = Math.abs(b.y-(w.y+w.h));
                        let min = Math.min(fL, fR, fT, fB);
                        if(min === fL || min === fR) b.vx *= -1; else b.vy *= -1;
                        b.bounces++; 
                    }
                });
                if(b.bounces > 1) destroyed = true;

                // दुश्मन को लगना
                tanks.forEach(t => {
                    if(t.alive && b.ownerId !== t.id && Math.hypot(b.x-t.x, b.y-t.y) < 25*scale) {
                        t.hp -= 25; 
                        destroyed = true; 
                        updateHealthUI(); 
                        checkDeath(t);
                    }
                });

                if(destroyed) bullets.splice(i, 1);
            }
        }

        // बाउंड्री बॉक्स टकराव
        function resolveAABB(tank, obj) {
            let r = 20 * scale;
            let testX = Math.max(obj.x, Math.min(tank.x, obj.x+obj.w));
            let testY = Math.max(obj.y, Math.min(tank.y, obj.y+obj.h));
            let distX = tank.x - testX, distY = tank.y - testY;
            let dist = Math.sqrt(distX*distX + distY*distY);
            if (dist < r) {
                let overlap = r - dist;
                tank.x += (distX/dist||0) * overlap; 
                tank.y += (distY/dist||0) * overlap;
            }
        }

        // गोली चलाना
        function fireBullet(t) {
            let speed = 15 * scale;
            let bx = t.x + Math.cos(t.angle)*(30*scale); 
            let by = t.y + Math.sin(t.angle)*(30*scale);
            
            bullets.push({ 
                x: bx, y: by, 
                vx: Math.cos(t.angle)*speed, 
                vy: Math.sin(t.angle)*speed, 
                ownerId: t.id, color: t.color, bounces: 0 
            });
            
            t.cooldown = 20; // फायर रेट
            t.vx -= Math.cos(t.angle)*3; t.vy -= Math.sin(t.angle)*3; // Recoil
        }

        // मरना चेक करना
        function checkDeath(tank) {
            if(tank.hp <= 0 && tank.alive) {
                tank.alive = false; tank.hp = 0;
                let aliveTanks = tanks.filter(t => t.alive);
                if(aliveTanks.length <= 1) {
                    setTimeout(() => endGame(aliveTanks[0]), 1000);
                }
            }
        }

        // ==========================================
        // 🎨 DRAW ENGINE (SIMPLE 2D)
        // ==========================================
        function drawGame() {
            // बैकग्राउंड
            ctx.fillStyle = '#1a2618'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ग्रिड
            ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50*scale) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=50*scale) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            // दीवारें
            walls.forEach(w => {
                ctx.fillStyle = '#555'; ctx.fillRect(w.x, w.y, w.w, w.h);
                ctx.strokeStyle = '#222'; ctx.lineWidth = 3; ctx.strokeRect(w.x, w.y, w.w, w.h);
            });

            // टैंक
            tanks.forEach(t => {
                ctx.save(); 
                ctx.translate(t.x, t.y); ctx.rotate(t.angle);
                
                if(!t.alive) {
                    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0,0, 20*scale, 0, Math.PI*2); ctx.fill();
                    ctx.restore(); return;
                }

                // टायर
                ctx.fillStyle = '#000';
                ctx.fillRect(-15*scale, -22*scale, 30*scale, 10*scale);
                ctx.fillRect(-15*scale, 12*scale, 30*scale, 10*scale);

                // शरीर (Body)
                ctx.fillStyle = t.color;
                ctx.beginPath(); ctx.roundRect(-16*scale, -16*scale, 32*scale, 32*scale, 5); ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

                // बैरल (Gun)
                ctx.fillStyle = '#333'; ctx.fillRect(0, -4*scale, 28*scale, 8*scale);

                // सिर (Turret)
                ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(0, 0, 10*scale, 0, Math.PI*2); ctx.fill();

                ctx.restore();
                
                // नाम
                ctx.fillStyle = '#fff'; ctx.font = `bold ${14*scale}px Arial`; ctx.textAlign = 'center';
                ctx.fillText(t.name, t.x, t.y - 30*scale);
            });

            // गोलियां
            bullets.forEach(b => {
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, 4*scale, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = b.color; ctx.globalAlpha = 0.5; ctx.beginPath(); ctx.arc(b.x, b.y, 8*scale, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0;
            });
        }

        // ==========================================
        // 🚀 GAME LOOP & BUTTON LOGIC
        // ==========================================
        function updateHealthUI() {
            document.getElementById('p1Health').style.width = Math.max(0, tanks[0].hp) + '%';
            document.getElementById('p2Health').style.width = Math.max(0, tanks[1].hp) + '%';
            document.getElementById('p3Health').style.width = Math.max(0, tanks[2].hp) + '%';
        }

        let animationId;
        function loop() {
            if (currentState === 'PLAYING') {
                updatePhysics();
                drawGame();
                animationId = requestAnimationFrame(loop);
            }
        }

        // 🌟 Start Game Function (बटन से लिंक)
        function startGame() {
            console.log("Game Started!"); // कंसोल में चेक करने के लिए
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('healthBars').classList.remove('hidden');
            
            initMap();
            currentState = 'PLAYING';
            
            // अगर पहले से लूप चल रहा हो तो उसे रोककर नया चलाएं (Glitch रोकने के लिए)
            cancelAnimationFrame(animationId);
            loop(); 
        }

        function endGame(winner) {
            currentState = 'GAMEOVER';
            document.getElementById('healthBars').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            if(winner) {
                document.getElementById('winnerText').innerHTML = `${winner.name} WINS! 🏆`;
                document.getElementById('winnerText').style.color = winner.color;
            } else {
                document.getElementById('winnerText').innerHTML = "DRAW! 💀";
                document.getElementById('winnerText').style.color = "#fff";
            }
            
            // पीछे का सीन ब्लर कर दो
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
        }

        // बटन पर इवेंट लिस्नर लगाओ
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // शुरुआत
        resizeCanvas();
        drawGame(); // पहली बार स्क्रीन ड्रा कर दो ताकि खाली न दिखे

    </script>
</body>
</html>
