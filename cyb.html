<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐭 Chuha vs Billi - PRO MAX 🐱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .glass-panel {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .clickable { pointer-events: auto; }
        #game-over { display: none; }
    </style>
</head>
<body>

    <!-- 🎮 Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- 📊 UI Scoreboard & Controls -->
    <div class="ui-layer flex flex-col justify-between p-4 md:p-6">
        
        <!-- Top Bar: Scores -->
        <div class="flex justify-between items-start">
            <!-- Player 1: Chuha -->
            <div class="glass-panel p-3 md:p-4 rounded-2xl flex flex-col items-center border-l-4 border-l-green-400">
                <h2 class="text-lg md:text-xl font-bold text-green-400">P1 (Keyboard)</h2>
                <div class="text-2xl md:text-3xl my-1">🐭</div>
                <div class="text-xs md:text-sm text-gray-300">W A S D + SPACE</div>
                <div class="mt-2 font-bold text-yellow-300 text-lg md:text-xl" id="score-board">Cheese: 0/10 🧀</div>
                <div class="w-full bg-gray-700 h-2 mt-2 rounded-full overflow-hidden">
                    <div id="chuha-cooldown" class="bg-green-400 h-full w-full transition-all duration-100"></div>
                </div>
            </div>

            <!-- VS Badge -->
            <div class="glass-panel px-4 py-2 md:px-6 md:py-3 rounded-full text-xl md:text-2xl font-black text-white bg-gradient-to-r from-green-500 to-red-500 shadow-[0_0_15px_rgba(255,255,255,0.3)] border-2 border-white/20">
                PRO MAX MAP 🔥
            </div>

            <!-- Player 2: Billi -->
            <div class="glass-panel p-3 md:p-4 rounded-2xl flex flex-col items-center border-r-4 border-r-red-400">
                <h2 class="text-lg md:text-xl font-bold text-red-400">P2 (Mouse)</h2>
                <div class="text-2xl md:text-3xl my-1">🐱</div>
                <div class="text-xs md:text-sm text-gray-300">Mouse + CLICK</div>
                <div class="mt-2 font-bold text-red-400 text-lg md:text-xl">Goal: Catch 🐭!</div>
                <div class="w-full bg-gray-700 h-2 mt-2 rounded-full overflow-hidden">
                    <div id="billi-cooldown" class="bg-red-400 h-full w-full transition-all duration-100"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 🏆 Game Over Screen -->
    <div id="game-over" class="fixed inset-0 bg-black/85 backdrop-blur-lg flex flex-col items-center justify-center clickable z-50">
        <h1 id="winner-text" class="text-4xl md:text-6xl font-black mb-4 animate-bounce text-center drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">🏆</h1>
        <p id="winner-sub" class="text-xl md:text-2xl text-gray-300 mb-8 text-center px-4">Game Over!</p>
        <button onclick="startGame()" class="px-8 py-4 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full text-xl font-bold hover:scale-110 transition-transform shadow-[0_0_30px_rgba(6,182,212,0.6)] border-2 border-white/30">
            Play Again 🔄
        </button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let walls = [];
        let portals = [];

        // 🗺️ Create Dynamic Map based on screen size
        function buildMap() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let w = canvas.width;
            let h = canvas.height;
            let thick = 20; // Wall thickness

            // Reset Arrays
            walls = [];
            
            // 🧱 Neon Walls Layout (Maze)
            walls.push({x: w*0.2, y: h*0.2, width: w*0.6, height: thick}); // Top mid
            walls.push({x: w*0.2, y: h*0.8, width: w*0.6, height: thick}); // Bottom mid
            walls.push({x: w*0.3, y: h*0.4, width: thick, height: h*0.2}); // Left vertical
            walls.push({x: w*0.7, y: h*0.4, width: thick, height: h*0.2}); // Right vertical
            walls.push({x: w*0.5 - thick/2, y: h*0.4, width: thick, height: h*0.2}); // Center obstacle

            // 🌀 Portals (Left and Right edges)
            portals = [
                {x: 50, y: h/2, color: '#00f2fe'},
                {x: w - 50, y: h/2, color: '#4facfe'}
            ];
        }
        window.addEventListener('resize', buildMap);
        buildMap(); // Initial build

        // --- ⚙️ GAME SETTINGS ---
        const GAME = { state: 'playing', cheeseTarget: 10 };

        const chuha = {
            x: 150, y: 150, size: 35,
            baseSpeed: 5, currentSpeed: 5,
            dashSpeed: 14, dashTime: 15, dashTimer: 0,
            cooldown: 150, cooldownTimer: 0,
            portalWait: 0, score: 0, isSpicy: 0
        };

        const billi = {
            x: window.innerWidth - 150, y: window.innerHeight - 150, size: 45,
            baseSpeed: 4.5, currentSpeed: 4.5, // Thodi slow taaki balance rahe
            dashSpeed: 16, dashTime: 12, dashTimer: 0,
            cooldown: 180, cooldownTimer: 0,
            portalWait: 0, targetX: window.innerWidth - 150, targetY: window.innerHeight - 150,
            isSpicy: 0
        };

        const cheese = { x: 0, y: 0, size: 30, active: false };
        const powerup = { x: 0, y: 0, size: 35, active: false, timer: 0 }; // Mirchi!

        const keys = { w: false, a: false, s: false, d: false };

        // --- ⌨️ INPUTS ---
        window.addEventListener('keydown', (e) => {
            if(GAME.state !== 'playing') return;
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = true;
            if(key === ' ' && chuha.cooldownTimer === 0) {
                chuha.dashTimer = chuha.dashTime;
                chuha.cooldownTimer = chuha.cooldown;
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if(keys.hasOwnProperty(key)) keys[key] = false;
        });

        window.addEventListener('mousemove', (e) => {
            if(GAME.state !== 'playing') return;
            billi.targetX = e.clientX;
            billi.targetY = e.clientY;
        });

        window.addEventListener('mousedown', (e) => {
            if(GAME.state !== 'playing') return;
            if(e.button === 0 && billi.cooldownTimer === 0) {
                billi.dashTimer = billi.dashTime;
                billi.cooldownTimer = billi.cooldown;
            }
        });

        // --- 🛡️ COLLISION LOGIC (BOX HITBOX) ---
        // Player is treated as a square for easy wall collision
        function hitWall(nx, ny, size) {
            let hitBox = size * 0.7; // Thoda chota hitbox taaki atak na jaye
            let left = nx - hitBox/2, right = nx + hitBox/2;
            let top = ny - hitBox/2, bottom = ny + hitBox/2;

            for(let w of walls) {
                if (right > w.x && left < w.x + w.width &&
                    bottom > w.y && top < w.y + w.height) {
                    return true;
                }
            }
            return false;
        }

        function safeSpawn() {
            let x, y, safe = false;
            while(!safe) {
                x = Math.random() * (canvas.width - 100) + 50;
                y = Math.random() * (canvas.height - 100) + 50;
                safe = !hitWall(x, y, 50); // check wall overlap
            }
            return {x, y};
        }

        function spawnCheese() {
            let pos = safeSpawn();
            cheese.x = pos.x; cheese.y = pos.y;
            cheese.active = true;
        }

        function spawnPowerUp() {
            if(Math.random() < 0.005 && !powerup.active) { // Random chance every frame
                let pos = safeSpawn();
                powerup.x = pos.x; powerup.y = pos.y;
                powerup.active = true;
                powerup.timer = 400; // Stays on screen for some time
            }
        }

        // --- 🌀 PORTAL LOGIC ---
        function checkPortals(player) {
            if(player.portalWait > 0) { player.portalWait--; return; }
            
            let p1 = portals[0], p2 = portals[1];
            let dist1 = Math.hypot(player.x - p1.x, player.y - p1.y);
            let dist2 = Math.hypot(player.x - p2.x, player.y - p2.y);

            if(dist1 < 40) {
                player.x = p2.x; player.y = p2.y;
                player.portalWait = 60; // Wait 1 sec before can teleport again
            } else if(dist2 < 40) {
                player.x = p1.x; player.y = p1.y;
                player.portalWait = 60;
            }
        }

        // --- 🔄 MAIN LOOP ---
        function update() {
            if(GAME.state !== 'playing') return;

            // --- CHUHA UPDATE ---
            let cSpeed = chuha.baseSpeed;
            if(chuha.dashTimer > 0) { cSpeed = chuha.dashSpeed; chuha.dashTimer--; }
            if(chuha.isSpicy > 0) { cSpeed *= 1.5; chuha.isSpicy--; }
            if(chuha.cooldownTimer > 0) chuha.cooldownTimer--;

            let cNextX = chuha.x + (keys.d ? cSpeed : keys.a ? -cSpeed : 0);
            let cNextY = chuha.y + (keys.s ? cSpeed : keys.w ? -cSpeed : 0);

            // Sliding collision for Chuha
            if(!hitWall(cNextX, chuha.y, chuha.size)) chuha.x = cNextX;
            if(!hitWall(chuha.x, cNextY, chuha.size)) chuha.y = cNextY;
            
            // Screen Bounds Chuha
            chuha.x = Math.max(chuha.size/2, Math.min(canvas.width - chuha.size/2, chuha.x));
            chuha.y = Math.max(chuha.size/2, Math.min(canvas.height - chuha.size/2, chuha.y));
            checkPortals(chuha);

            // --- BILLI UPDATE ---
            let bSpeed = billi.baseSpeed;
            if(billi.dashTimer > 0) { bSpeed = billi.dashSpeed; billi.dashTimer--; }
            if(billi.isSpicy > 0) { bSpeed *= 1.5; billi.isSpicy--; }
            if(billi.cooldownTimer > 0) billi.cooldownTimer--;

            let dx = billi.targetX - billi.x;
            let dy = billi.targetY - billi.y;
            let dist = Math.hypot(dx, dy);

            if(dist > bSpeed) {
                let moveX = (dx / dist) * bSpeed;
                let moveY = (dy / dist) * bSpeed;
                
                // Sliding collision for Billi
                if(!hitWall(billi.x + moveX, billi.y, billi.size)) billi.x += moveX;
                if(!hitWall(billi.x, billi.y + moveY, billi.size)) billi.y += moveY;
            }

            // Screen Bounds Billi
            billi.x = Math.max(billi.size/2, Math.min(canvas.width - billi.size/2, billi.x));
            billi.y = Math.max(billi.size/2, Math.min(canvas.height - billi.size/2, billi.y));
            checkPortals(billi);

            // --- INTERACTIONS ---
            // 1. Eat Cheese
            if(cheese.active && Math.hypot(chuha.x - cheese.x, chuha.y - cheese.y) < 35) {
                chuha.score++;
                document.getElementById('score-board').innerText = `Cheese: ${chuha.score}/${GAME.cheeseTarget} 🧀`;
                cheese.active = false;
                if(chuha.score >= GAME.cheeseTarget) {
                    endGame("🐭 Player 1 Wins!", "Chuha ne saara cheese kha liya! 🧀");
                } else {
                    setTimeout(spawnCheese, 500);
                }
            }

            // 2. PowerUp Logic (Spicy Mirchi)
            spawnPowerUp();
            if(powerup.active) {
                powerup.timer--;
                if(powerup.timer <= 0) powerup.active = false;
                
                if(Math.hypot(chuha.x - powerup.x, chuha.y - powerup.y) < 35) {
                    chuha.isSpicy = 180; // 3 seconds boost
                    powerup.active = false;
                } else if (Math.hypot(billi.x - powerup.x, billi.y - powerup.y) < 40) {
                    billi.isSpicy = 180;
                    powerup.active = false;
                }
            }

            // 3. Game Over (Billi catches Chuha)
            if(Math.hypot(billi.x - chuha.x, billi.y - chuha.y) < (chuha.size/2 + billi.size/2 - 5)) {
                endGame("🐱 Player 2 Wins!", "Billi ne Chuhe ko pakad liya! 🐾");
            }

            // UI Updates
            document.getElementById('chuha-cooldown').style.width = `${100 - (chuha.cooldownTimer / chuha.cooldown * 100)}%`;
            document.getElementById('billi-cooldown').style.width = `${100 - (billi.cooldownTimer / billi.cooldown * 100)}%`;

            draw();
            requestAnimationFrame(update);
        }

        // --- 🎨 RENDER ---
        let time = 0;
        function draw() {
            time += 0.05;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 🧱 Draw Neon Walls
            ctx.fillStyle = '#0f172a';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#38bdf8';
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 2;
            for(let w of walls) {
                ctx.fillRect(w.x, w.y, w.width, w.height);
                ctx.strokeRect(w.x, w.y, w.width, w.height);
            }
            ctx.shadowBlur = 0; // Reset

            // 🌀 Draw Portals
            for(let p of portals) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(time);
                ctx.shadowBlur = 20;
                ctx.shadowColor = p.color;
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            // 🎨 Draw Emojis Function
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // 🧀 Draw Cheese
            if(cheese.active) {
                ctx.shadowBlur = 15; ctx.shadowColor = "yellow";
                ctx.font = `${cheese.size + Math.sin(time)*5}px Arial`; // Bouncing effect
                ctx.fillText("🧀", cheese.x, cheese.y);
                ctx.shadowBlur = 0;
            }

            // 🌶️ Draw PowerUp
            if(powerup.active) {
                ctx.shadowBlur = 20; ctx.shadowColor = "red";
                ctx.font = `${powerup.size}px Arial`;
                ctx.fillText("🌶️", powerup.x, powerup.y);
                ctx.shadowBlur = 0;
            }

            // 🐭 Draw Chuha
            ctx.font = `${chuha.size}px Arial`;
            if(chuha.isSpicy > 0) { ctx.shadowBlur = 20; ctx.shadowColor = "red"; }
            ctx.fillText("🐭", chuha.x, chuha.y);
            ctx.shadowBlur = 0;

            // 🐱 Draw Billi
            ctx.font = `${billi.size}px Arial`;
            if(billi.isSpicy > 0) { ctx.shadowBlur = 20; ctx.shadowColor = "red"; }
            ctx.fillText("🐱", billi.x, billi.y);
            ctx.shadowBlur = 0;
            
            // Aim Pointer
            ctx.beginPath();
            ctx.arc(billi.targetX, billi.targetY, 6, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 50, 50, 0.6)";
            ctx.fill();
        }

        // --- 🏁 GAME CONTROLS ---
        function startGame() {
            let p1 = safeSpawn();
            chuha.x = p1.x; chuha.y = p1.y;
            chuha.score = 0; chuha.cooldownTimer = 0; chuha.dashTimer = 0; chuha.isSpicy = 0;
            
            let p2 = safeSpawn();
            // Make sure Billi spawns away from Chuha initially
            while(Math.hypot(p2.x - p1.x, p2.y - p1.y) < 300) { p2 = safeSpawn(); }
            billi.x = p2.x; billi.y = p2.y;
            billi.targetX = billi.x; billi.targetY = billi.y;
            billi.cooldownTimer = 0; billi.dashTimer = 0; billi.isSpicy = 0;

            powerup.active = false;
            document.getElementById('score-board').innerText = `Cheese: 0/${GAME.cheeseTarget} 🧀`;
            document.getElementById('game-over').style.display = 'none';
            
            GAME.state = 'playing';
            spawnCheese();
            update();
        }

        function endGame(title, subtitle) {
            GAME.state = 'gameover';
            document.getElementById('winner-text').innerText = title;
            document.getElementById('winner-sub').innerText = subtitle;
            document.getElementById('game-over').style.display = 'flex';
            
            // Celebration! 🎉
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
        }

        // Start!
        startGame();

    </script>
</body>
</html>
