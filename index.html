<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 Utsav OS - The Power 🥰</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(20, 25, 40, 0.35);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.25);
        }

        /* 🌈 Advanced Animated Gradient Background */
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            color: white;
            /* Default Beautiful Moving Gradient */
            background: linear-gradient(-45deg, #0f172a, #312e81, #1e1b4b, #064e3b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            transition: all 0.5s ease-in-out;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🖼️ Hidden GIF Wallpaper Class (Triggered by Alt+G) */
        body.gif-wallpaper {
            background-image: url('https://s13.gifyu.com/images/bmzDJ.gif') !important;
            background-size: cover !important;
            background-position: center !important;
            animation: none !important; /* Stop gradient animation */
        }

        /* Fast Boot Screen */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        /* Portrait Warning overlay */
        #portrait-warning {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(15px);
        }
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex; }
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Desktop Icons Grid */
        #desktop {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 25px 15px;
            align-content: start;
            height: calc(100vh - 50px);
            position: relative;
            z-index: 10;
        }

        /* 🍏 Mac Style App Icons (Opening in New Tab) */
        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }

        .mac-icon {
            width: 65px;
            height: 65px;
            border-radius: 22%; /* Perfect Apple Squircle */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .mac-icon::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 50%);
            border-radius: 22%;
        }

        .app-icon-wrapper:hover .mac-icon {
            transform: translateY(-5px) scale(1.08);
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .app-icon-wrapper:active .mac-icon {
            transform: scale(0.95);
        }

        .mac-icon svg {
            width: 32px;
            height: 32px;
            color: white;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
            z-index: 2;
        }

        .app-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.9);
            letter-spacing: 0.3px;
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 3px 10px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }

        .app-icon-wrapper:hover .app-title {
            background: rgba(255,255,255,0.2);
        }

        /* Custom Right Click Menu */
        #context-menu {
            display: none;
            position: absolute;
            z-index: 10000;
            width: 200px;
            border-radius: 12px;
            padding: 8px;
            animation: fadeIn 0.2s ease;
        }

        .menu-item {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Taskbar */
        #taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            border-top: 1px solid var(--glass-border);
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(30px);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>

    <!-- 🚀 Fast Boot Screen -->
    <div id="boot-screen">
        <div class="w-16 h-16 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-2xl font-bold text-white tracking-widest animate-pulse">UTSAV OS Starting...</h2>
    </div>

    <!-- Portrait Warning -->
    <div id="portrait-warning">
        <svg class="w-20 h-20 text-white mb-4 animate-[spin_3s_linear_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        <h1 class="text-3xl font-bold text-cyan-400 mb-2">Rotate Your Phone!</h1>
        <p class="text-lg text-gray-300">अपना स्क्रीन घुमाए 🔄</p>
    </div>

    <!-- 💻 Custom Right Click Menu -->
    <div id="context-menu" class="glass-panel">
        <div class="menu-item" onclick="triggerRefresh()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            Refresh
        </div>
        <div class="menu-item" onclick="toggleFullScreen()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            Full Screen
        </div>
        <div class="h-[1px] bg-white/20 my-1"></div>
        <div class="menu-item text-xs text-gray-300 pointer-events-none">
            Alt+G : GIF Wall<br>Alt+S : Color Wall
        </div>
    </div>

    <!-- 📱 Desktop Area (Opening in new tabs just like before) -->
    <div id="desktop">
        
        <!-- App 1: Baloon Game -->
        <a href="bln.html" target="_blank" class="app-icon-wrapper" style="animation-delay: 0.1s" onclick="fireConfetti(event)">
            <div class="mac-icon bg-gradient-to-br from-red-500 to-rose-700">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <path d="M12 2C9.5 2 7.5 4.5 7.5 8C7.5 11.5 10.5 15 12 17C13.5 15 16.5 11.5 16.5 8C16.5 4.5 14.5 2 12 2ZM11.5 18H12.5L13 22H11L11.5 18Z"/>
                </svg>
            </div>
            <span class="app-title">Baloon Game</span>
        </a>

        <!-- App 2: MK Game -->
        <a href="cyb.html" target="_blank" class="app-icon-wrapper" style="animation-delay: 0.2s" onclick="fireConfetti(event)">
            <div class="mac-icon bg-gradient-to-br from-blue-500 to-indigo-700">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <rect x="5" y="2" width="14" height="20" rx="7"/>
                    <line x1="12" y1="8" x2="12" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="6" r="1" fill="white"/>
                </svg>
            </div>
            <span class="app-title">MK Game</span>
        </a>

        <!-- App 3: KeyMAP -->
        <a href="info.html" target="_blank" class="app-icon-wrapper" style="animation-delay: 0.3s" onclick="fireConfetti(event)">
            <div class="mac-icon bg-gradient-to-br from-gray-700 to-black">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <rect x="2" y="6" width="20" height="12" rx="2"/>
                    <rect x="4" y="8" width="2" height="2" fill="white" opacity="0.8" rx="0.5"/>
                    <rect x="8" y="8" width="2" height="2" fill="white" opacity="0.8" rx="0.5"/>
                    <rect x="12" y="8" width="2" height="2" fill="white" opacity="0.8" rx="0.5"/>
                    <rect x="16" y="8" width="2" height="2" fill="white" opacity="0.8" rx="0.5"/>
                    <rect x="6" y="12" width="12" height="2" fill="white" opacity="0.8" rx="0.5"/>
                </svg>
            </div>
            <span class="app-title">KeyMAP</span>
        </a>

        <!-- App 4: Passage -->
        <a href="para.html" target="_blank" class="app-icon-wrapper" style="animation-delay: 0.4s" onclick="fireConfetti(event)">
            <div class="mac-icon bg-gradient-to-br from-purple-500 to-fuchsia-700">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <path d="M6 2C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V4C20 2.89543 19.1046 2 18 2H6ZM8 6H16V8H8V6ZM8 10H16V12H8V10ZM8 14H13V16H8V14Z"/>
                </svg>
            </div>
            <span class="app-title">Passage</span>
        </a>

        <!-- App 5: Words Type -->
        <a href="type.html" target="_blank" class="app-icon-wrapper" style="animation-delay: 0.5s" onclick="fireConfetti(event)">
            <div class="mac-icon bg-gradient-to-br from-orange-500 to-amber-600">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <rect x="3" y="3" width="18" height="18" rx="4"/>
                    <text x="12" y="17" font-size="14" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">T</text>
                </svg>
            </div>
            <span class="app-title">Words Type</span>
        </a>

        <!-- App 6: ZomGame -->
        <a href="zom.html" target="_blank" class="app-icon-wrapper" style="animation-delay: 0.6s" onclick="fireConfetti(event)">
            <div class="mac-icon bg-gradient-to-br from-emerald-500 to-green-700">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <path d="M12 2C8.13401 2 5 5.13401 5 9V19.5C5 20.8807 6.11929 22 7.5 22C8.1611 22 8.76269 21.7431 9.20711 21.3197L10.3803 20.1464C11.2589 19.2678 12.6834 19.2678 13.562 20.1464L14.7353 21.3197C15.1797 21.7431 15.7813 22 16.4424 22C17.8231 22 18.9424 20.8807 18.9424 19.5V9C18.9424 5.13401 15.8084 2 11.9424 2H12ZM9 8C9.55228 8 10 8.44772 10 9C10 9.55228 9.55228 10 9 10C8.44772 10 8 9.55228 8 9C8 8.44772 8.44772 8 9 8ZM15 8C15.5523 8 16 8.44772 16 9C16 9.55228 15.5523 10 15 10C14.4477 10 14 9.55228 14 9C14 8.44772 14.4477 8 15 8ZM10.5 14H13.5V16H10.5V14Z"/>
                </svg>
            </div>
            <span class="app-title">ZomGame</span>
        </a>

    </div>

    <!-- 🎛️ Taskbar -->
    <div id="taskbar">
        <!-- Start / Logo Area -->
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center shadow-[0_0_15px_rgba(34,211,238,0.5)] cursor-pointer hover:rotate-180 transition-all duration-500" onclick="hugeConfetti()">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <span class="font-bold text-lg tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-300">UTSAV OS</span>
        </div>

        <!-- System Tray -->
        <div class="flex items-center gap-4">
            
            <!-- Full Screen Button -->
            <button onclick="toggleFullScreen()" class="hover:bg-white/20 p-2 rounded-lg transition-all" title="Full Screen">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>

            <!-- Clock -->
            <div id="clock" class="text-sm font-mono font-bold bg-black/50 px-3 py-1.5 rounded-md border border-white/10 shadow-inner">
                00:00 AM
            </div>
        </div>
    </div>

    <script>
        // --- 🚀 FAST BOOT ANIMATION ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const bootScreen = document.getElementById('boot-screen');
                bootScreen.style.opacity = '0';
                setTimeout(() => bootScreen.remove(), 500);
                
                // Welcome Confetti
                confetti({ particleCount: 100, spread: 100, origin: { y: 0.6 } });
            }, 800); // 0.8s boot time
        });

        // --- 🖼️ HIDDEN WALLPAPER SYSTEM (ALT+G / ALT+S) ---
        // Alt+G = Secret GIF, Alt+S = Default Gradient Back
        document.addEventListener('keydown', (e) => {
            if (e.altKey && e.key.toLowerCase() === 'g') {
                e.preventDefault();
                // Add class to change background smoothly
                document.body.classList.add('gif-wallpaper');
                console.log("Secret GIF Wallpaper Activated! 🤫");
            }
            if (e.altKey && e.key.toLowerCase() === 's') {
                e.preventDefault();
                // Remove class to go back to Default Gradient
                document.body.classList.remove('gif-wallpaper');
                console.log("Default Animated Gradient Restored! 🌈");
            }
        });

        // --- 💻 CUSTOM RIGHT CLICK MENU ---
        const contextMenu = document.getElementById('context-menu');
        
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault(); // Default menu hatao
            contextMenu.style.display = 'block';
            
            // Adjust position so it doesn't go out of screen
            let x = e.clientX;
            let y = e.clientY;
            
            if (x + 200 > window.innerWidth) x = window.innerWidth - 210;
            if (y + 100 > window.innerHeight) y = window.innerHeight - 110;

            contextMenu.style.left = `${x}px`;
            contextMenu.style.top = `${y}px`;
        });

        document.addEventListener('click', () => {
            contextMenu.style.display = 'none';
        });

        function triggerRefresh() {
            window.location.reload();
        }

        // --- 🔲 FULL SCREEN LOGIC ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // --- 🎉 CONFETTI ON CLICK ---
        function fireConfetti(event) {
            const x = event.clientX / window.innerWidth;
            const y = event.clientY / window.innerHeight;
            confetti({
                particleCount: 50,
                spread: 60,
                origin: { x: x, y: y },
                colors: ['#38bdf8', '#4ade80', '#facc15', '#f87171', '#c084fc']
            });
        }

        function hugeConfetti() {
            var duration = 2 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // --- 🕰️ LIVE CLOCK ---
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').textContent = hours + ':' + minutes + ' ' + ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
