<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 Utsav OS - The Power 🥰</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(20, 25, 40, 0.45);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-highlight: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow: hidden;
            /* Default Wallpaper */
            background-image: url('https://512pixels.net/wp-content/uploads/2025/06/14-Sonoma-Light-thumb.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            user-select: none;
            color: white;
            transition: background-image 0.5s ease-in-out;
        }

        /* Portrait Warning overlay */
        #portrait-warning {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(15px);
        }
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex; }
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Desktop Icons Grid */
        #desktop {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 25px 15px;
            align-content: start;
            height: calc(100vh - 50px);
            position: relative;
            z-index: 10;
        }

        /* Mac Style App Icons */
        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }

        .mac-icon {
            width: 65px;
            height: 65px;
            border-radius: 22%; /* Perfect Apple Squircle */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-icon-wrapper:hover .mac-icon {
            transform: translateY(-5px) scale(1.08);
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .app-icon-wrapper:active .mac-icon {
            transform: scale(0.95);
        }

        .mac-icon svg {
            width: 32px;
            height: 32px;
            color: white;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .app-title {
            font-size: 0.8rem;
            font-weight: 500;
            text-align: center;
            text-shadow: 0px 1px 3px rgba(0,0,0,0.9);
            letter-spacing: 0.3px;
            color: white;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }

        /* Taskbar */
        #taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            border-top: 1px solid var(--glass-border);
            border-bottom: none;
            border-left: none;
            border-right: none;
            background: rgba(10, 15, 30, 0.6);
        }

        /* OS Window styling */
        .os-window {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 800px;
            max-width: 90vw;
            height: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0.95);
            animation: windowOpen 0.3s forwards;
        }

        .os-window.maximized {
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            max-width: 100vw !important;
            height: calc(100vh - 45px) !important; /* Taskbar height minus */
            max-height: 100vh !important;
            border-radius: 0;
        }

        .window-header {
            height: 38px;
            background: linear-gradient(to bottom, rgba(60,60,60,0.8), rgba(40,40,40,0.9));
            border-bottom: 1px solid rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            cursor: move;
            backdrop-filter: blur(10px);
        }

        /* Keyframes */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes windowOpen {
            to { opacity: 1; transform: scale(1); }
        }

        /* Hide scrollbar for iframe container */
        .window-content {
            flex: 1;
            background: #fff;
            position: relative;
        }

    </style>
</head>
<body>

    <!-- Portrait Warning -->
    <div id="portrait-warning">
        <svg class="w-20 h-20 text-white mb-4 animate-[spin_3s_linear_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        <h1 class="text-3xl font-bold text-cyan-400 mb-2">Rotate Your Phone!</h1>
        <p class="text-lg text-gray-300">अपना स्क्रीन घुमाए 🔄</p>
    </div>

    <!-- Desktop Area -->
    <div id="desktop">
        
        <!-- App 1: Baloon Game -->
        <div class="app-icon-wrapper" style="animation-delay: 0.1s" onclick="openApp(event, 'bln.html', 'Baloon Game')">
            <div class="mac-icon bg-gradient-to-br from-red-400 to-rose-600">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <path d="M12 2C9.5 2 7.5 4.5 7.5 8C7.5 11.5 10.5 15 12 17C13.5 15 16.5 11.5 16.5 8C16.5 4.5 14.5 2 12 2ZM11.5 18H12.5L13 22H11L11.5 18Z"/>
                </svg>
            </div>
            <span class="app-title">Baloon Game</span>
        </div>

        <!-- App 2: MK Game -->
        <div class="app-icon-wrapper" style="animation-delay: 0.2s" onclick="openApp(event, 'cyb.html', 'MK Game')">
            <div class="mac-icon bg-gradient-to-br from-blue-400 to-indigo-600">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <rect x="5" y="2" width="14" height="20" rx="7"/>
                    <line x1="12" y1="8" x2="12" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="6" r="1" fill="white"/>
                </svg>
            </div>
            <span class="app-title">MK Game</span>
        </div>

        <!-- App 3: KeyMAP -->
        <div class="app-icon-wrapper" style="animation-delay: 0.3s" onclick="openApp(event, 'info.html', 'KeyMAP')">
            <div class="mac-icon bg-gradient-to-br from-gray-600 to-gray-900">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <rect x="2" y="6" width="20" height="12" rx="2"/>
                    <rect x="4" y="8" width="2" height="2" fill="black" opacity="0.5" rx="0.5"/>
                    <rect x="8" y="8" width="2" height="2" fill="black" opacity="0.5" rx="0.5"/>
                    <rect x="12" y="8" width="2" height="2" fill="black" opacity="0.5" rx="0.5"/>
                    <rect x="16" y="8" width="2" height="2" fill="black" opacity="0.5" rx="0.5"/>
                    <rect x="6" y="12" width="12" height="2" fill="black" opacity="0.5" rx="0.5"/>
                </svg>
            </div>
            <span class="app-title">KeyMAP</span>
        </div>

        <!-- App 4: Passage -->
        <div class="app-icon-wrapper" style="animation-delay: 0.4s" onclick="openApp(event, 'para.html', 'Passage')">
            <div class="mac-icon bg-gradient-to-br from-purple-400 to-fuchsia-600">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <path d="M6 2C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V4C20 2.89543 19.1046 2 18 2H6ZM8 6H16V8H8V6ZM8 10H16V12H8V10ZM8 14H13V16H8V14Z"/>
                </svg>
            </div>
            <span class="app-title">Passage</span>
        </div>

        <!-- App 5: Words Type -->
        <div class="app-icon-wrapper" style="animation-delay: 0.5s" onclick="openApp(event, 'type.html', 'Words Type')">
            <div class="mac-icon bg-gradient-to-br from-orange-400 to-amber-600">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <rect x="3" y="3" width="18" height="18" rx="4"/>
                    <text x="12" y="17" font-size="14" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">T</text>
                </svg>
            </div>
            <span class="app-title">Words Type</span>
        </div>

        <!-- App 6: ZomGame -->
        <div class="app-icon-wrapper" style="animation-delay: 0.6s" onclick="openApp(event, 'zom.html', 'ZomGame')">
            <div class="mac-icon bg-gradient-to-br from-emerald-400 to-green-600">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <path d="M12 2C8.13401 2 5 5.13401 5 9V19.5C5 20.8807 6.11929 22 7.5 22C8.1611 22 8.76269 21.7431 9.20711 21.3197L10.3803 20.1464C11.2589 19.2678 12.6834 19.2678 13.562 20.1464L14.7353 21.3197C15.1797 21.7431 15.7813 22 16.4424 22C17.8231 22 18.9424 20.8807 18.9424 19.5V9C18.9424 5.13401 15.8084 2 11.9424 2H12ZM9 8C9.55228 8 10 8.44772 10 9C10 9.55228 9.55228 10 9 10C8.44772 10 8 9.55228 8 9C8 8.44772 8.44772 8 9 8ZM15 8C15.5523 8 16 8.44772 16 9C16 9.55228 15.5523 10 15 10C14.4477 10 14 9.55228 14 9C14 8.44772 14.4477 8 15 8ZM10.5 14H13.5V16H10.5V14Z"/>
                </svg>
            </div>
            <span class="app-title">ZomGame</span>
        </div>

    </div>

    <!-- Container for opened Windows -->
    <div id="windows-container"></div>

    <!-- Taskbar -->
    <div id="taskbar" class="glass-panel backdrop-blur-3xl">
        <!-- Start / Logo Area -->
        <div class="flex items-center gap-4">
            <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center shadow-[0_0_15px_rgba(34,211,238,0.5)] cursor-pointer hover:rotate-180 transition-all duration-500" onclick="hugeConfetti()">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <span class="font-bold text-md tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-300">UTSAV OS</span>
        </div>

        <!-- System Tray -->
        <div class="flex items-center gap-4">
            <!-- Clock -->
            <div id="clock" class="text-xs font-mono font-bold bg-black/50 px-3 py-1.5 rounded-md border border-white/10 shadow-inner">
                00:00 AM
            </div>
        </div>
    </div>

    <script>
        // --- 🖼️ HIDDEN WALLPAPER SYSTEM (ALT+G / ALT+S) ---
        // Alt+G = GIF, Alt+S = Default Sonoma
        document.addEventListener('keydown', (e) => {
            if (e.altKey && e.key.toLowerCase() === 'g') {
                e.preventDefault();
                document.body.style.backgroundImage = "url('https://s13.gifyu.com/images/bmzDJ.gif')";
                console.log("Secret Wallpaper Activated! 🤫");
            }
            if (e.altKey && e.key.toLowerCase() === 's') {
                e.preventDefault();
                document.body.style.backgroundImage = "url('https://512pixels.net/wp-content/uploads/2025/06/14-Sonoma-Light-thumb.jpg')";
                console.log("Default Wallpaper Restored! 🌅");
            }
        });

        // --- 🪟 WINDOW MANAGEMENT SYSTEM (PC STYLE) ---
        const windows = {}; // Keep track of opened apps
        let zIndexCounter = 100;

        function openApp(event, url, title) {
            event.preventDefault();
            
            // Celebration for opening app
            confetti({ particleCount: 40, spread: 50, origin: { x: event.clientX / window.innerWidth, y: event.clientY / window.innerHeight } });

            // If app is already open, just bring it to front and show
            if (windows[title]) {
                const win = windows[title];
                win.style.display = 'flex';
                bringToFront(win);
                return;
            }

            // Create new Window Container
            const win = document.createElement('div');
            win.className = `os-window glass-panel`;
            win.id = `window-${title.replace(/\s/g, '')}`;
            win.style.zIndex = ++zIndexCounter;
            
            // Random slight offset so windows don't perfectly overlap
            const offset = Object.keys(windows).length * 20;
            win.style.top = `calc(10% + ${offset}px)`;
            win.style.left = `calc(10% + ${offset}px)`;

            // Window Header (Mac Style Traffic Lights)
            const header = document.createElement('div');
            header.className = 'window-header';
            
            // Traffic lights container
            const lights = document.createElement('div');
            lights.className = 'flex gap-2 w-16';
            lights.innerHTML = `
                <div class="w-3.5 h-3.5 rounded-full bg-red-500 hover:bg-red-600 shadow-inner border border-red-700 cursor-pointer flex items-center justify-center group" onclick="closeApp('${title}')">
                    <svg class="w-2 h-2 opacity-0 group-hover:opacity-100 text-red-900" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                </div>
                <div class="w-3.5 h-3.5 rounded-full bg-yellow-500 hover:bg-yellow-600 shadow-inner border border-yellow-700 cursor-pointer flex items-center justify-center group" onclick="minimizeApp('${title}')">
                    <svg class="w-2 h-2 opacity-0 group-hover:opacity-100 text-yellow-900" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"></path></svg>
                </div>
                <div class="w-3.5 h-3.5 rounded-full bg-green-500 hover:bg-green-600 shadow-inner border border-green-700 cursor-pointer flex items-center justify-center group" onclick="maximizeApp('${title}')">
                    <svg class="w-2 h-2 opacity-0 group-hover:opacity-100 text-green-900" fill="currentColor" viewBox="0 0 24 24"><path d="M15 3h6v6h-2V6.41L11.41 14l-1.42-1.41L17.59 5H15V3zM9 21H3v-6h2v4.59l7.59-7.59 1.41 1.42L6.41 19H9v2z"></path></svg>
                </div>
            `;

            // Window Title
            const titleSpan = document.createElement('div');
            titleSpan.className = 'font-semibold text-gray-200 text-xs tracking-wide pointer-events-none';
            titleSpan.innerText = title;

            // Empty div to balance header flex
            const spacer = document.createElement('div');
            spacer.className = 'w-16';

            header.appendChild(lights);
            header.appendChild(titleSpan);
            header.appendChild(spacer);

            // Window Content (Iframe)
            const content = document.createElement('div');
            content.className = 'window-content';
            
            const iframe = document.createElement('iframe');
            iframe.src = url;
            iframe.className = 'w-full h-full border-none bg-white'; 

            content.appendChild(iframe);
            win.appendChild(header);
            win.appendChild(content);
            
            document.getElementById('windows-container').appendChild(win);
            windows[title] = win;

            // Make it draggable
            makeDraggable(win, header);

            // Bring to front on click
            win.addEventListener('mousedown', () => bringToFront(win));
            win.addEventListener('touchstart', () => bringToFront(win), {passive: true});
        }

        // Window Controls Actions
        function closeApp(title) {
            if (windows[title]) {
                windows[title].remove();
                delete windows[title];
            }
        }

        function minimizeApp(title) {
            if (windows[title]) {
                windows[title].style.display = 'none';
            }
        }

        function maximizeApp(title) {
            if (windows[title]) {
                const win = windows[title];
                win.classList.toggle('maximized');
                bringToFront(win);
            }
        }

        function bringToFront(win) {
            win.style.zIndex = ++zIndexCounter;
        }

        // Dragging Logic (Supports Mouse & Touch)
        function makeDraggable(win, handle) {
            let isDragging = false;
            let startX, startY, initialX, initialY;

            handle.addEventListener('mousedown', dragStart);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', dragEnd);

            // Touch support for mobile dragging
            handle.addEventListener('touchstart', dragStart, {passive: false});
            document.addEventListener('touchmove', drag, {passive: false});
            document.addEventListener('touchend', dragEnd);

            function dragStart(e) {
                // Don't drag if clicking buttons or maximized
                if(e.target.closest('.w-3\\.5') || win.classList.contains('maximized')) return; 
                
                isDragging = true;
                win.style.transition = 'none'; // Smooth drag
                win.querySelector('iframe').style.pointerEvents = 'none'; // Prevent iframe from stealing mouse events

                if (e.type === 'touchstart') {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                } else {
                    startX = e.clientX;
                    startY = e.clientY;
                }

                const rect = win.getBoundingClientRect();
                initialX = rect.left;
                initialY = rect.top;
                
                bringToFront(win);
            }

            function drag(e) {
                if (!isDragging) return;
                e.preventDefault();

                let currentX, currentY;
                if (e.type === 'touchmove') {
                    currentX = e.touches[0].clientX;
                    currentY = e.touches[0].clientY;
                } else {
                    currentX = e.clientX;
                    currentY = e.clientY;
                }

                const dx = currentX - startX;
                const dy = currentY - startY;

                win.style.left = `${initialX + dx}px`;
                win.style.top = `${initialY + dy}px`;
            }

            function dragEnd() {
                if (!isDragging) return;
                isDragging = false;
                win.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)'; // Restore transition
                win.querySelector('iframe').style.pointerEvents = 'auto'; // Re-enable iframe clicks
            }
        }

        // --- ⚡ F11 FULLSCREEN LOGIC ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F11') {
                e.preventDefault(); // Stop default browser F11
                
                // Find top-most open window to maximize it inside OS
                let topWindow = null;
                let highestZ = 0;
                
                for (let key in windows) {
                    if (windows[key].style.display !== 'none' && parseInt(windows[key].style.zIndex) > highestZ) {
                        highestZ = parseInt(windows[key].style.zIndex);
                        topWindow = windows[key];
                    }
                }

                if (topWindow) {
                    topWindow.classList.toggle('maximized');
                } else {
                    // If no window is open, make the whole website full screen
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().catch(err => console.log(err));
                    } else {
                        document.exitFullscreen();
                    }
                }
            }
        });

        // --- 🕰️ LIVE CLOCK ---
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').textContent = hours + ':' + minutes + ' ' + ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Start Button Huge Explosion
        function hugeConfetti() {
            var duration = 2 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // Intro Animation
        window.onload = () => {
            setTimeout(() => {
                confetti({ particleCount: 100, spread: 100, origin: { y: 0.6 } });
            }, 500);
        };
    </script>
</body>
</html>
